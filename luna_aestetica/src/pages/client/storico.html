<!-- src/pages/storico.html -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<import from="../../components/client-header"></import>
<client-header></client-header>

<div class="dashboard-container">
  <div class="login-card" style="max-width: 600px;">
    <div class="logo">
      <div class="moon"></div>
      <h1>Luna <span>AEstetica</span></h1>
    </div>
    <p class="subtitle">Storico delle tue prenotazioni</p>
    
    <div class="appointments-list"> 
      
      <p if.bind="!prenotazioni.length" class="subtitle">Nessuna prenotazione trovata.</p>

      <div repeat.for="p of prenotazioni" class="appointment-row ${p.is_future ? 'future-row' : 'past-row'}">
        <let status.bind="getBookingStatus(p)"></let>

        <div class="appointment-main">
          <div class="appointment-info">
            <strong repeat.for="s of p.services">${s.name}${!$last ? ', ' : ''}</strong>
            <span class="date-time">
              📅 ${formattaData(p.date)} 
              ⏰ ${p.start_time}
            </span>
            <small class="duration">Durata: ${p.total_duration} min</small>
            <strong if.bind="settings.show_prices" class="price-tag">€ ${p.total_price}</strong>
          </div>

          <span class="badge ${status.class}">
            <i class="fas ${status.icon}"></i> ${status.label}
          </span>
        </div>

        <div class="appointment-actions" if.bind="p.is_future && !p.is_cancelled">
          <button if.bind="p.is_cancellable"
                  click.trigger="annulla(p.id)" 
                  class="btn-mini btn-red">
            <i data-lucide="trash-2"></i> Annulla
          </button>
          
          <button if.bind="p.is_editable" 
                  click.trigger="cambia(p.id)" 
                  class="btn-mini btn-gold">
            <i data-lucide="edit-3"></i> Cambia
          </button>
        </div>
      </div>
      
    </div>
  </div>
</div>
